      <div class="rtitle-rule"></div>
    </header>
    <div class="rpoem">
      <div class="rstanza">
        <span class="rline">אויף א פלעק</span>
        <span class="rline">זאגט מיין באבע</span>
        <span class="rline">לייגן מ'זאל</span>
        <span class="rline">אביסל אלקאהאל.</span>
      </div>
      <div class="rstanza">
        <span class="rline">עס קען</span>
        <span class="rline">צוריקשטעלן</span>
        <span class="rline">דעם ארגינעלן</span>
        <span class="rline">גלאנץ.</span>
      </div>
      <div class="rstanza">
        <span class="rline">אינעם לונג</span>
        <span class="rline">פון א איד</span>
        <span class="rline">אביסל וויין</span>
        <span class="rline">גיס אריין.</span>
      </div>
      <div class="rstanza">
        <span class="rline">לאז עס טאנצן</span>
        <span class="rline">אפאר מינוט</span>
        <span class="rline">עס וועט גלאנצן</span>
        <span class="rline">ווי א איד.</span>
      </div>
    </div>
